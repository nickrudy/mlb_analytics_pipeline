name: MLB Analytics Pipeline — Daily Run

on:
  # ── Scheduled triggers (all times UTC, CDT = UTC-5) ──────────────────────
  # 9:30 AM CT  = 14:30 UTC — full morning run (includes Statcast)
  # 11:00 AM CT = 16:00 UTC — early afternoon lineup watch
  # 11:30 AM CT = 16:30 UTC — 12:05 PM game coverage (buffer for drift)
  # 1:00 PM CT  = 18:00 UTC — afternoon game pre-pitch + lineup watch
  # 2:00 PM CT  = 19:00 UTC — main evening lineup posting window
  # 3:00 PM CT  = 20:00 UTC — evening lineup confirmation
  # 4:00 PM CT  = 21:00 UTC — pre-evening game final check
  # 6:00 PM CT  = 23:00 UTC — evening games, late lineup changes
  # 8:00 PM CT  = 01:00 UTC — west coast games
  # 8:00 AM CT Monday = 13:00 UTC — weekly seed-dimensions roster refresh
  schedule:
    - cron: "30 14 * * *"   # 9:30 AM CT  — full run with Statcast
    - cron: "0 16 * * *"    # 11:00 AM CT — early afternoon lineup watch
    - cron: "30 16 * * *"   # 11:30 AM CT — 12:05 PM game coverage
    - cron: "0 18 * * *"    # 1:00 PM CT  — afternoon game pre-pitch
    - cron: "0 19 * * *"    # 2:00 PM CT  — main evening lineup window
    - cron: "0 20 * * *"    # 3:00 PM CT  — evening lineup confirmation
    - cron: "0 21 * * *"    # 4:00 PM CT  — pre-evening game final check
    - cron: "0 23 * * *"    # 6:00 PM CT  — evening games, late changes
    - cron: "0 1 * * *"     # 8:00 PM CT  — west coast games
    - cron: "0 13 * * 1"    # 8:00 AM CT Monday — weekly seed-dimensions refresh

  # ── Manual trigger ────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      skip_statcast:
        description: "Skip Statcast pull"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Dry run — fetch data but skip writes"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Prevent concurrent runs from stomping on each other
concurrency:
  group: mlb-pipeline
  cancel-in-progress: false

jobs:
  run_pipeline:
    name: Daily MLB Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write Google Sheets credentials
      - name: Write GSheets credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}' > config/sheets_credentials.json

      # ── 5. Detect run type and execute pipeline
      #       9:30 AM CT (14:30 UTC) = full run with Statcast
      #         — detected by HOUR_UTC=14; GitHub drift may push into hour 15
      #         — all other hours skip Statcast
      #       Monday 8:00 AM CT (13:00 UTC) = seed-dimensions run
      #       Manual runs respect the skip_statcast input
      - name: Run MLB pipeline
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            HOUR_UTC=$(date -u +%H)
            MINUTE_UTC=$(date -u +%M)
            DAY_OF_WEEK=$(date -u +%u)  # 1=Monday
            if [ "$DAY_OF_WEEK" = "1" ] && [ "$HOUR_UTC" = "13" ]; then
              echo "Monday seed-dimensions run"
              python run_pipeline.py --today --seed-dimensions
            elif [ "$MANUAL_SKIP_STATCAST" = "true" ]; then
              echo "Manual override: skipping Statcast"
              python run_pipeline.py --today --skip-statcast
            elif [ "$HOUR_UTC" = "14" ] || [ "$HOUR_UTC" = "15" ]; then
              echo "Morning full run (${HOUR_UTC}:${MINUTE_UTC} UTC) — including Statcast"
              python run_pipeline.py --today
            else
              echo "Intraday refresh (${HOUR_UTC}:${MINUTE_UTC} UTC) — skipping Statcast"
              python run_pipeline.py --today --skip-statcast
            fi
        env:
          DB_BACKEND: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SHEETS_KEY_PATH: config/sheets_credentials.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ github.event.inputs.run_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GIT_SHA: ${{ github.sha }}
          MANUAL_SKIP_STATCAST: ${{ github.event.inputs.skip_statcast || 'false' }}

      # ── 6. Upload logs
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore