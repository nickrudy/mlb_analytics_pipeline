name: MLB Analytics Pipeline — Daily Run

on:
  # ── Scheduled trigger: 10:00 AM ET = 14:00 UTC (works for both EST and EDT)
  # Adjust if your games start early (west coast day games)
  schedule:
    - cron: "0 14 * * *"

  # ── Manual trigger with optional override date (for backfills / reruns)
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      dry_run:
        description: "Dry run — fetch data but skip writes"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Prevent concurrent runs from stomping on each other
concurrency:
  group: mlb-pipeline
  cancel-in-progress: false

jobs:
  run_pipeline:
    name: Daily MLB Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout cloud-migration branch (changes to main after merge)
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.10 to match local dev environment
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write Google Sheets service account key to disk
      #       The secret stores the entire JSON content as a string.
      #       Written to config/sheets_credentials.json to match the
      #       default path in utils/config.py.
      - name: Write GSheets credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}' > config/sheets_credentials.json

      # ── 5. Run the pipeline
      #       All secrets injected as env vars — nothing touches the filesystem
      #       except the credentials file written above.
      - name: Run MLB pipeline
        env:
          DB_BACKEND: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SHEETS_KEY_PATH: config/sheets_credentials.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ github.event.inputs.run_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GIT_SHA: ${{ github.sha }}
        run: python run_pipeline.py --today

      # ── 6. Upload logs as artifact (30-day retention)
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

