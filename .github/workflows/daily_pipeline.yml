name: MLB Analytics Pipeline — Daily Run

on:
  # ── Scheduled triggers (all times UTC, CDT = UTC-5) ──────────────────────
  # NOTE: CDT (UTC-5) assumed. Revisit after DST ends (~Nov 1, 2026) if the
  #       pipeline is still running — CST is UTC-6, a 1hr shift vs these crons.
  #
  # Minutes are deliberately off :00/:30 — GitHub Actions documents that
  # scheduled workflows are delayed most often at the top of the hour, and
  # community reports confirm 15-30+ min drift is common there.
  #
  # Full-run times were also shifted several hours earlier than the games
  # they support, as a buffer against observed 1.5-2hr+ schedule drift.
  # This is a first-pass estimate — validate against actual "Requested" vs
  # job-start timestamps in the Actions tab over the next 1-2 weeks and
  # adjust as needed.
  #
  # ── Full pipeline (Statcast + hand splits) ──
  # ~6:06 AM CT = 11:06 UTC — full run with Statcast
  #   (was 9:30 AM CT; Statcast lags 24-48hrs and hand splits reflect prior-day
  #   game action, both already settled well before dawn — data availability
  #   shouldn't be a blocker this early, but worth confirming over a week)
  # ~8:12 AM CT Monday = 13:12 UTC — weekly seed-dimensions roster refresh
  #
  # ── Intraday lineup-watch runs (skip-Statcast) ──
  # ~9:18 AM CT  = 14:18 UTC — early lineup watch (merges former 11:00/11:30 pair —
  #                             redundant "drift buffer" trigger removed; this job's
  #                             cancel-in-progress:true handles staleness instead)
  # ~11:41 AM CT = 16:41 UTC — afternoon game pre-pitch + lineup watch
  # ~12:27 PM CT = 17:27 UTC — main lineup posting window
  # ~1:53 PM CT  = 18:53 UTC — lineup confirmation
  # ~2:36 PM CT  = 19:36 UTC — pre-evening game final check
  # ~4:22 PM CT  = 21:22 UTC — evening games, late lineup changes
  # ~6:44 PM CT  = 23:44 UTC — west coast games
  schedule:
    - cron: "6 11 * * *"     # full run w/ Statcast
    - cron: "12 13 * * 1"    # Monday seed-dimensions refresh
    - cron: "18 14 * * *"    # intraday: early lineup watch
    - cron: "41 16 * * *"    # intraday: afternoon pre-pitch
    - cron: "27 17 * * *"    # intraday: main lineup window
    - cron: "53 18 * * *"    # intraday: lineup confirmation
    - cron: "36 19 * * *"    # intraday: pre-evening check
    - cron: "22 21 * * *"    # intraday: evening late changes
    - cron: "44 23 * * *"    # intraday: west coast games

  # ── Manual trigger ────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      skip_statcast:
        description: "Skip Statcast pull"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Dry run — fetch data but skip writes"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # FULL RUN — Statcast pull + Monday seed-dimensions.
  # Own concurrency lane, cancel-in-progress:false — this one shouldn't be
  # interrupted mid-run. Intraday triggers no longer queue behind it because
  # they live in a separate concurrency group below.
  # ══════════════════════════════════════════════════════════════════════
  full_run:
    name: Full Pipeline (Statcast / Seed)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_statcast != 'true')
      || github.event.schedule == '6 11 * * *'
      || github.event.schedule == '12 13 * * 1'
    concurrency:
      group: mlb-pipeline-full
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GSheets credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}' > config/sheets_credentials.json

      - name: Run MLB pipeline (full)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            if [ "${{ github.event.schedule }}" = "12 13 * * 1" ]; then
              echo "Monday seed-dimensions run"
              python run_pipeline.py --today --seed-dimensions
            else
              echo "Full run — including Statcast"
              python run_pipeline.py --today
            fi
        env:
          DB_BACKEND: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SHEETS_KEY_PATH: config/sheets_credentials.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ github.event.inputs.run_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GIT_SHA: ${{ github.sha }}

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-full-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  # ══════════════════════════════════════════════════════════════════════
  # INTRADAY RUN — lineup watches, skip-Statcast.
  # Own concurrency lane, cancel-in-progress:true — these are idempotent
  # snapshots keyed by as_of_date, so a newer trigger superseding a stale
  # in-flight one is fine and prevents cascading queue delay through the day.
  # ══════════════════════════════════════════════════════════════════════
  intraday_run:
    name: Intraday Lineup Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_statcast == 'true')
      || contains(
           fromJSON('["18 14 * * *","41 16 * * *","27 17 * * *","53 18 * * *","36 19 * * *","22 21 * * *","44 23 * * *"]'),
           github.event.schedule
         )
    concurrency:
      group: mlb-pipeline-intraday
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GSheets credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}' > config/sheets_credentials.json

      - name: Run MLB pipeline (intraday)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 45
          command: |
            echo "Intraday refresh — skipping Statcast"
            python run_pipeline.py --today --skip-statcast
        env:
          DB_BACKEND: supabase
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SHEETS_KEY_PATH: config/sheets_credentials.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ github.event.inputs.run_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GIT_SHA: ${{ github.sha }}

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-intraday-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore